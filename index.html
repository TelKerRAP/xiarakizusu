<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Acceso al Archivo XZ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Orbitron',sans-serif;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#00d9ff;
}

/* Fondo */

.background{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(0,217,255,.15),
#000 70%);
z-index:-2;
}

/* Scanlines */

.scanlines{
position:fixed;
width:100%;
height:100%;
background:
repeating-linear-gradient(
to bottom,
transparent,
transparent 2px,
rgba(255,255,255,.03) 3px
);
pointer-events:none;
z-index:-1;
}

/* Contenedor */

.container{
text-align:center;
padding:40px;
max-width:900px;
}

/* Logo */

.logo{
font-size:6rem;
font-weight:900;

text-shadow:
0 0 20px #00d9ff,
0 0 50px #00d9ff,
0 0 100px #00d9ff;

animation:pulse 3s infinite;
}

@keyframes pulse{

0%{
opacity:.8;
}

50%{
opacity:1;
}

100%{
opacity:.8;
}

}

/* Texto */

.subtitle{

margin-top:25px;

font-size:1.2rem;

color:#ccc;

letter-spacing:3px;
}

/* Terminal */

.terminal{

margin-top:50px;

border:1px solid #00d9ff;

padding:20px;

background:rgba(0,0,0,.6);

text-align:left;

max-width:700px;

margin-left:auto;
margin-right:auto;

box-shadow:0 0 25px rgba(0,217,255,.2);

}

.line{
opacity:0;
animation:show 1s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:2s;}
.line:nth-child(3){animation-delay:3s;}
.line:nth-child(4){animation-delay:4s;}

@keyframes show{
to{
opacity:1;
}
}

/* Botón */

.enter{

margin-top:40px;

padding:18px 60px;

font-size:1rem;

background:transparent;

border:1px solid #00d9ff;

color:#00d9ff;

cursor:pointer;

transition:.3s;
}

.enter:hover{

background:#00d9ff;

color:#000;

box-shadow:
0 0 30px #00d9ff,
0 0 60px #00d9ff;

}

/* Footer */

.footer{

margin-top:40px;

font-size:.8rem;

color:#666;

letter-spacing:2px;

}

</style>
</head>

<body>

<div class="background"></div>
<div class="scanlines"></div>

<div class="container">

<h1 class="logo">
XIARAKI ZUSU
</h1>

<p class="subtitle">
ARCHIVO XZ · TRANSMISIÓN SEGURA
</p>

<div class="terminal">

<div class="line">
> INICIANDO SISTEMA...
</div>

<div class="line">
> ESCANEANDO RED...
</div>

<div class="line">
> ACCESO AUTORIZADO...
</div>

<div class="line">
> BIENVENIDO OBSERVADOR.
</div>

</div>

<button
class="enter"
onclick="entrar()">

ACCEDER AL ARCHIVO

</button>

<div class="footer">

LA TORMENTA NO DESTRUYE LA VERDAD...
LA REVELA.

</div>

</div>

<script>

function entrar(){

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="1.html";

},1000);

}

</script>

</body>
</html>
